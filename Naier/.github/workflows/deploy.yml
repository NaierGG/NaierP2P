name: ci-cd

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download backend dependencies
        run: go mod download

      - name: Run backend tests
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build web client
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true

      - name: Install mobile dependencies
        run: flutter pub get

      - name: Analyze mobile client
        run: flutter analyze

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, web, mobile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      MESH_AUTH_JWT_SECRET: ${{ secrets.MESH_AUTH_JWT_SECRET }}
      MESH_DATABASE_POSTGRES_DSN: ${{ secrets.MESH_DATABASE_POSTGRES_DSN }}
      MESH_DATABASE_REDIS_ADDR: ${{ secrets.MESH_DATABASE_REDIS_ADDR }}
      MESH_DATABASE_REDIS_PASSWORD: ${{ secrets.MESH_DATABASE_REDIS_PASSWORD }}
      MESH_MEDIA_MINIO_ENDPOINT: ${{ secrets.MESH_MEDIA_MINIO_ENDPOINT }}
      MESH_MEDIA_MINIO_BUCKET: ${{ secrets.MESH_MEDIA_MINIO_BUCKET }}
      MESH_MEDIA_MINIO_ACCESS_KEY: ${{ secrets.MESH_MEDIA_MINIO_ACCESS_KEY }}
      MESH_MEDIA_MINIO_SECRET_KEY: ${{ secrets.MESH_MEDIA_MINIO_SECRET_KEY }}
      MESH_FEDERATION_SERVER_DOMAIN: ${{ secrets.MESH_FEDERATION_SERVER_DOMAIN }}
      MESH_FEDERATION_SERVER_PUBLIC_KEY: ${{ secrets.MESH_FEDERATION_SERVER_PUBLIC_KEY }}
      MESH_FEDERATION_SERVER_PRIVATE_KEY: ${{ secrets.MESH_FEDERATION_SERVER_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend container
        run: docker build -f backend/Dockerfile -t mesh-chat-backend:${{ github.sha }} backend

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Fly secrets
        run: |
          flyctl secrets set \
            MESH_AUTH_JWT_SECRET="$MESH_AUTH_JWT_SECRET" \
            MESH_DATABASE_POSTGRES_DSN="$MESH_DATABASE_POSTGRES_DSN" \
            MESH_DATABASE_REDIS_ADDR="$MESH_DATABASE_REDIS_ADDR" \
            MESH_DATABASE_REDIS_PASSWORD="$MESH_DATABASE_REDIS_PASSWORD" \
            MESH_MEDIA_MINIO_ENDPOINT="$MESH_MEDIA_MINIO_ENDPOINT" \
            MESH_MEDIA_MINIO_BUCKET="$MESH_MEDIA_MINIO_BUCKET" \
            MESH_MEDIA_MINIO_ACCESS_KEY="$MESH_MEDIA_MINIO_ACCESS_KEY" \
            MESH_MEDIA_MINIO_SECRET_KEY="$MESH_MEDIA_MINIO_SECRET_KEY" \
            MESH_FEDERATION_SERVER_DOMAIN="$MESH_FEDERATION_SERVER_DOMAIN" \
            MESH_FEDERATION_SERVER_PUBLIC_KEY="$MESH_FEDERATION_SERVER_PUBLIC_KEY" \
            MESH_FEDERATION_SERVER_PRIVATE_KEY="$MESH_FEDERATION_SERVER_PRIVATE_KEY" \
            --app mesh-chat-api

      - name: Deploy to Fly.io
        run: flyctl deploy --config infra/fly.toml --remote-only

      - name: Verify migration status
        run: flyctl ssh console --app mesh-chat-api -C "/app/migrate status"
