services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naier
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: mesh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d naier"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MESH_SERVER_HOST: 0.0.0.0
      MESH_SERVER_PORT: 8080
      MESH_SERVER_MODE: debug
      MESH_DATABASE_POSTGRES_DSN: postgres://mesh:mesh@postgres:5432/naier?sslmode=disable
      MESH_DATABASE_REDIS_ADDR: redis:6379
      MESH_DATABASE_REDIS_PASSWORD: ""
      MESH_AUTH_JWT_SECRET: development-secret
      MESH_AUTH_JWT_EXPIRY: 15m
      MESH_AUTH_REFRESH_EXPIRY: 720h
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
