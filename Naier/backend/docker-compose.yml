services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naier
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: mesh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d naier"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MESH_SERVER_HOST: 0.0.0.0
      MESH_SERVER_PORT: 8080
      MESH_SERVER_MODE: debug
      MESH_SERVER_ALLOWED_ORIGINS: http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173
      MESH_DATABASE_POSTGRES_DSN: postgres://mesh:mesh@postgres:5432/naier?sslmode=disable
      MESH_DATABASE_REDIS_ADDR: redis:6379
      MESH_DATABASE_REDIS_PASSWORD: ""
      MESH_AUTH_JWT_SECRET: development-secret
      MESH_AUTH_JWT_EXPIRY: 15m
      MESH_AUTH_REFRESH_EXPIRY: 720h
      MESH_BETA_INVITE_ONLY: ${MESH_BETA_INVITE_ONLY:-false}
      MESH_ADMIN_API_TOKEN: ${MESH_ADMIN_API_TOKEN:-development-admin-token}
      MESH_FEDERATION_SERVER_DOMAIN: local.naier
      MESH_FEDERATION_SERVER_PUBLIC_KEY: HfTarX+isRAQ70iy8xxuy7bxpdA2IlUYf6GbDpBgrzk=
      MESH_FEDERATION_SERVER_PRIVATE_KEY: gbZlcA4R7umBffYCUjL0C5ECODsSUTZ2BM8d7jsZU6kd9Nqtf6KxEBDvSLLzHG7LtvGl0DYiVRh/oZsOkGCvOQ==
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres-remote:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naier_remote
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: mesh
    ports:
      - "5433:5432"
    volumes:
      - postgres-remote-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d naier_remote"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-remote:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-remote-data:/data

  backend-remote:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MESH_SERVER_HOST: 0.0.0.0
      MESH_SERVER_PORT: 8080
      MESH_SERVER_MODE: debug
      MESH_SERVER_ALLOWED_ORIGINS: http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173
      MESH_DATABASE_POSTGRES_DSN: postgres://mesh:mesh@postgres-remote:5432/naier_remote?sslmode=disable
      MESH_DATABASE_REDIS_ADDR: redis-remote:6379
      MESH_DATABASE_REDIS_PASSWORD: ""
      MESH_AUTH_JWT_SECRET: development-secret-remote
      MESH_AUTH_JWT_EXPIRY: 15m
      MESH_AUTH_REFRESH_EXPIRY: 720h
      MESH_BETA_INVITE_ONLY: ${MESH_BETA_INVITE_ONLY:-false}
      MESH_ADMIN_API_TOKEN: ${MESH_ADMIN_API_TOKEN:-development-admin-token}
      MESH_FEDERATION_SERVER_DOMAIN: remote3.test
      MESH_FEDERATION_SERVER_PUBLIC_KEY: HfTarX+isRAQ70iy8xxuy7bxpdA2IlUYf6GbDpBgrzk=
      MESH_FEDERATION_SERVER_PRIVATE_KEY: gbZlcA4R7umBffYCUjL0C5ECODsSUTZ2BM8d7jsZU6kd9Nqtf6KxEBDvSLLzHG7LtvGl0DYiVRh/oZsOkGCvOQ==
    ports:
      - "8081:8080"
    depends_on:
      postgres-remote:
        condition: service_healthy
      redis-remote:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  postgres-remote-data:
  redis-remote-data:
