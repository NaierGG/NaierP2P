services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
      backend-3:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - certbot-webroot:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$API_DOMAIN' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    restart: unless-stopped

  backend-1:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment: &backend-env
      MESH_SERVER_HOST: 0.0.0.0
      MESH_SERVER_PORT: 8080
      MESH_SERVER_MODE: release
      MESH_SERVER_ALLOWED_ORIGINS: ${MESH_SERVER_ALLOWED_ORIGINS:?set MESH_SERVER_ALLOWED_ORIGINS}
      MESH_DATABASE_POSTGRES_DSN: postgres://mesh:${POSTGRES_PASSWORD:-mesh}@postgres:5432/naier?sslmode=disable
      MESH_DATABASE_REDIS_ADDR: redis:6379
      MESH_DATABASE_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MESH_AUTH_JWT_SECRET: ${MESH_AUTH_JWT_SECRET:?set MESH_AUTH_JWT_SECRET}
      MESH_AUTH_JWT_EXPIRY: 15m
      MESH_AUTH_REFRESH_EXPIRY: 720h
      MESH_BETA_INVITE_ONLY: ${MESH_BETA_INVITE_ONLY:-true}
      MESH_ADMIN_API_TOKEN: ${MESH_ADMIN_API_TOKEN:?set MESH_ADMIN_API_TOKEN}
      MESH_MEDIA_MINIO_ENDPOINT: minio:9000
      MESH_MEDIA_MINIO_BUCKET: ${MINIO_BUCKET:?set MINIO_BUCKET}
      MESH_MEDIA_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MESH_MEDIA_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MESH_FEDERATION_SERVER_DOMAIN: ${MESH_FEDERATION_SERVER_DOMAIN:?set MESH_FEDERATION_SERVER_DOMAIN}
      MESH_FEDERATION_SERVER_PUBLIC_KEY: ${MESH_FEDERATION_SERVER_PUBLIC_KEY:?set MESH_FEDERATION_SERVER_PUBLIC_KEY}
      MESH_FEDERATION_SERVER_PRIVATE_KEY: ${MESH_FEDERATION_SERVER_PRIVATE_KEY:?set MESH_FEDERATION_SERVER_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  backend-2:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  backend-3:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naier
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d naier"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-backups:/backups
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          timestamp=$$(date +%Y%m%d-%H%M%S)
          pg_dump -h postgres -U mesh -d naier > /backups/naier-$${timestamp}.sql
          find /backups -type f -mtime +7 -delete
          sleep 86400
        done
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "900"
      - "1"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:9000/minio/health/live >/dev/null || wget -q -O - http://localhost:9000/minio/health/live >/dev/null
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    command:
      - /bin/sh
      - -c
      - |
        trap exit TERM
        while true; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h
        done
    restart: unless-stopped

volumes:
  certbot-etc:
  certbot-webroot:
  postgres-data:
  postgres-backups:
  redis-data:
  minio-data:
