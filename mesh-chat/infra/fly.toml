app = "mesh-chat-api"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "backend/Dockerfile"

[deploy]
  strategy = "rolling"
  release_command = "/app/migrate up"

[env]
  MESH_SERVER_HOST = "0.0.0.0"
  MESH_SERVER_PORT = "8080"
  MESH_SERVER_MODE = "release"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
