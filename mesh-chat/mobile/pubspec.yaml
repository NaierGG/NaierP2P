name: mesh_chat_mobile
description: Decentralized messenger mobile client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^13.2.5
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  web_socket_channel: ^3.0.3
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.2.4
  image_picker: ^1.1.2
  file_picker: ^8.3.2
  cached_network_image: ^3.4.1
  flutter_chat_ui: ^1.6.15
  cryptography: ^2.7.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  retrofit_generator: ^9.1.7

flutter:
  uses-material-design: true
